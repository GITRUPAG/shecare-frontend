<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon - multiple sizes for visibility -->
    <!-- Replace your current favicon links with these -->
<link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
<link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e91e8c" />

    <!-- Primary Meta -->
    <meta name="description" content="🌸 Launching on International Women's Day — SheCare is your personal wellness companion. Track cycles, health goals, and celebrate being you." />
    <meta name="keywords" content="women health, wellness, cycle tracker, self care, shecare, international womens day, womens day 2025" />

    <!-- Open Graph (WhatsApp, iMessage, LinkedIn, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shecare.fit/" />
    <meta property="og:site_name" content="SheCare" />

    <!-- ✅ Fixed: Title is now 54 chars (optimal 50–60) -->
    <meta property="og:title" content="🌸 SheCare – Launched on International Women's Day" />

    <!-- ✅ Fixed: Description is now 145 chars (optimal 110–160) -->
    <meta property="og:description" content="A gift to every woman 💝 Track your cycle, set wellness goals & build self-care routines — all in one beautiful app. Happy Women's Day!" />

    <!-- ✅ Fixed: Use a 1200x630px compressed image under 600KB -->
    <meta property="og:image" content="https://shecare.fit/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SheCare – Launched on International Women's Day 🌸" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://shecare.fit/" />
    <meta name="twitter:title" content="🌸 SheCare – Launched on International Women's Day" />
    <meta name="twitter:description" content="A gift to every woman 💝 Track your cycle, set wellness goals & build self-care routines. Launching March 8th!" />
    <meta name="twitter:image" content="https://shecare.fit/og-preview1.png" />
    <meta name="twitter:image:alt" content="SheCare – Women's Wellness App" />

    <!-- WhatsApp uses og: tags above — emojis in title/description render beautifully on WhatsApp -->

    <!-- iMessage / Apple -->
    <meta name="apple-mobile-web-app-title" content="SheCare" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>SheCare – Women's Wellness 🌸</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
